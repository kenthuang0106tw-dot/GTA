<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Open City 3D</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #080b0e;
      color: #f4efe4;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: #080b0e;
      touch-action: none;
      user-select: none;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 14;
      pointer-events: none;
    }

    body::before {
      background:
        radial-gradient(circle at 50% 45%, transparent 0 52%, rgba(0, 0, 0, 0.32) 100%),
        linear-gradient(rgba(255, 255, 255, 0.025), rgba(0, 0, 0, 0.02));
      mix-blend-mode: multiply;
    }

    body::after {
      background: repeating-linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.035) 0,
        rgba(255, 255, 255, 0.035) 1px,
        transparent 1px,
        transparent 4px
      );
      opacity: 0.18;
    }

    #game {
      position: fixed;
      inset: 0;
    }

    .hud {
      position: fixed;
      inset: 14px 14px auto 14px;
      z-index: 20;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .panel {
      width: 178px;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(8, 10, 12, 0.7);
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
    }

    .brand {
      margin: 0 0 8px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff5cf;
    }

    .row {
      display: grid;
      grid-template-columns: 62px 1fr;
      align-items: center;
      gap: 8px;
      min-height: 23px;
      color: #d8cfbd;
      font-size: 12px;
    }

    .bar {
      height: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
    }

    .bar span {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #43ad78, #e8c057);
    }

    .stars {
      display: flex;
      gap: 2px;
      font-size: 19px;
      color: rgba(255, 255, 255, 0.22);
      line-height: 1;
    }

    .stars b {
      color: #ffd866;
      text-shadow: 0 0 12px rgba(255, 216, 102, 0.7);
    }

    .mission {
      position: fixed;
      left: 50%;
      top: 16px;
      z-index: 20;
      transform: translateX(-50%);
      width: min(480px, calc(100vw - 30px));
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(8, 10, 12, 0.62);
      color: #eee2c8;
      font-size: 12px;
      text-align: center;
      backdrop-filter: blur(12px);
      pointer-events: none;
    }

    .crosshair {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 16;
      width: 28px;
      height: 28px;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .crosshair::before,
    .crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255, 244, 210, 0.86);
      box-shadow: 0 0 8px rgba(255, 244, 210, 0.35);
    }

    .crosshair::before {
      left: 13px;
      top: 2px;
      width: 2px;
      height: 24px;
    }

    .crosshair::after {
      left: 2px;
      top: 13px;
      width: 24px;
      height: 2px;
    }

    .weapon {
      position: fixed;
      right: 9vw;
      bottom: 0;
      z-index: 15;
      width: 180px;
      height: 180px;
      transform-origin: 70% 100%;
      pointer-events: none;
    }

    .gun {
      position: absolute;
      right: 20px;
      bottom: 18px;
      width: 124px;
      height: 46px;
      border-radius: 6px 16px 10px 6px;
      background: linear-gradient(160deg, #2c3030, #111315);
      box-shadow: inset 0 8px 0 rgba(255,255,255,0.06), 0 16px 28px rgba(0,0,0,0.45);
    }

    .gun::before {
      content: "";
      position: absolute;
      right: -30px;
      top: 12px;
      width: 48px;
      height: 14px;
      border-radius: 4px;
      background: #191c1d;
    }

    .gun::after {
      content: "";
      position: absolute;
      left: 18px;
      bottom: -42px;
      width: 30px;
      height: 54px;
      border-radius: 6px;
      transform: rotate(12deg);
      background: #171a1b;
    }

    .weapon.recoil {
      animation: recoil 90ms ease-out;
    }

    .weapon.driving .gun {
      right: -18px;
      bottom: -12px;
      width: 230px;
      height: 78px;
      border-radius: 110px 110px 0 0;
      background: linear-gradient(180deg, #25292a, #0e1012);
    }

    .weapon.driving .gun::before {
      right: 72px;
      top: -26px;
      width: 64px;
      height: 64px;
      border: 8px solid #151719;
      border-radius: 50%;
      background: transparent;
    }

    .weapon.driving .gun::after {
      left: 92px;
      bottom: 18px;
      width: 48px;
      height: 12px;
      border-radius: 8px;
      transform: none;
      background: #384146;
      box-shadow: -52px 2px 0 #192022, 52px 2px 0 #192022;
    }

    @keyframes recoil {
      from { transform: translate(12px, 10px) rotate(5deg); }
      to { transform: translate(0, 0) rotate(0); }
    }

    .help {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 18;
      transform: translateX(-50%);
      width: min(760px, calc(100vw - 30px));
      padding: 9px 12px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 8px;
      background: rgba(8, 10, 12, 0.56);
      color: #dcd2be;
      font-size: 12px;
      text-align: center;
      backdrop-filter: blur(12px);
      pointer-events: none;
    }

    .touch {
      position: fixed;
      inset: auto 0 0;
      z-index: 40;
      display: none;
      justify-content: space-between;
      align-items: flex-end;
      padding: 18px max(18px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
      pointer-events: none;
    }

    .stick,
    .look {
      width: 132px;
      height: 132px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 50%;
      background: rgba(8, 10, 12, 0.38);
      position: relative;
      backdrop-filter: blur(10px);
      pointer-events: auto;
    }

    .look {
      border-style: dashed;
    }

    .knob {
      position: absolute;
      left: 45px;
      top: 45px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(255, 241, 203, 0.86);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.4);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, 60px);
      grid-auto-rows: 60px;
      gap: 10px;
      pointer-events: auto;
    }

    button {
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      background: rgba(8, 10, 12, 0.64);
      color: #fff2cf;
      font-size: 12px;
      font-weight: 800;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(10px);
    }

    button:active {
      transform: translateY(1px) scale(0.98);
      background: rgba(89, 64, 45, 0.8);
    }

    @media (pointer: coarse), (max-width: 820px) {
      .hud {
        inset: 10px 10px auto 10px;
      }

      .panel {
        width: 142px;
        padding: 9px 10px;
      }

      .mission,
      .help {
        display: none;
      }

      .weapon {
        width: 136px;
        height: 136px;
        right: 5vw;
      }

      .gun {
        transform: scale(0.75);
      }

      .touch {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <div class="hud" aria-hidden="true">
    <div class="panel">
      <p class="brand">Open City 3D</p>
      <div class="row"><span>Health</span><div class="bar"><span id="health"></span></div></div>
      <div class="row"><span>Armor</span><div class="bar"><span id="armor"></span></div></div>
      <div class="row"><span>Ammo</span><strong id="ammo">48</strong></div>
      <div class="row"><span>Mode</span><strong id="mode">On foot</strong></div>
    </div>
    <div class="panel">
      <div id="stars" class="stars"></div>
    </div>
  </div>
  <div id="mission" class="mission">Explore the city. Find a car, drive, shoot, and survive the wanted level.</div>
  <div class="crosshair" aria-hidden="true"></div>
  <div id="weapon" class="weapon" aria-hidden="true"><div class="gun"></div></div>
  <div class="help">Click to aim lock | WASD move/drive | Mouse look | Left click shoot | F melee | E enter/exit car | Shift sprint | Space brake/boost | R reload</div>

  <div class="touch" aria-hidden="true">
    <div id="stick" class="stick"><div id="moveKnob" class="knob"></div></div>
    <div class="actions">
      <button id="hitBtn" type="button">HIT</button>
      <button id="fireBtn" type="button">FIRE</button>
      <button id="carBtn" type="button">CAR</button>
      <button id="gasBtn" type="button">GAS</button>
    </div>
    <div id="look" class="look"><div id="lookKnob" class="knob"></div></div>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

    const root = document.getElementById("game");
    const healthEl = document.getElementById("health");
    const armorEl = document.getElementById("armor");
    const ammoEl = document.getElementById("ammo");
    const modeEl = document.getElementById("mode");
    const starsEl = document.getElementById("stars");
    const missionEl = document.getElementById("mission");
    const weaponEl = document.getElementById("weapon");
    const keys = new Set();
    const WORLD = 2600;
    const ROAD_EVERY = 280;
    const ROAD_W = 58;
    const clock = new THREE.Clock();
    const raycaster = new THREE.Raycaster();
    const center = new THREE.Vector2(0, 0);
    const colliders = [];
    const bullets = [];
    const particles = [];
    const pedestrians = [];
    const vehicles = [];
    const cops = [];
    const input = {
      x: 0,
      y: 0,
      lookX: 0,
      lookY: 0,
      fire: false,
      gas: false
    };

    const player = {
      pos: new THREE.Vector3(0, 1.8, 0),
      yaw: 0,
      pitch: 0,
      health: 100,
      armor: 35,
      ammo: 48,
      wanted: 0,
      shootCd: 0,
      meleeCd: 0,
      reloadCd: 0,
      car: null,
      speed: 0
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xb7a783);
    scene.fog = new THREE.FogExp2(0xb7a783, 0.0022);

    const camera = new THREE.PerspectiveCamera(72, innerWidth / innerHeight, 0.1, 900);
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 1.5));
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.08;
    root.appendChild(renderer.domElement);

    const hemi = new THREE.HemisphereLight(0xf0d7a2, 0x3f4033, 1.18);
    scene.add(hemi);
    const sun = new THREE.DirectionalLight(0xffd090, 2.35);
    sun.position.set(-160, 260, 90);
    sun.castShadow = true;
    sun.shadow.camera.left = -360;
    sun.shadow.camera.right = 360;
    sun.shadow.camera.top = 360;
    sun.shadow.camera.bottom = -360;
    scene.add(sun);

    const textures = createTextureSet();
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x8b8657, map: textures.grass, roughness: 0.92 });
    const roadMat = new THREE.MeshStandardMaterial({ color: 0x55504b, map: textures.road, roughness: 0.96 });
    const sidewalkMat = new THREE.MeshStandardMaterial({ color: 0x8a8170, map: textures.sidewalk, roughness: 0.9 });
    const lineMat = new THREE.MeshBasicMaterial({ color: 0xd6c57b });

    function rnd(seed) {
      const x = Math.sin(seed * 12.9898) * 43758.5453;
      return x - Math.floor(x);
    }

    function clamp(v, a, b) {
      return Math.max(a, Math.min(b, v));
    }

    function createTextureSet() {
      return {
        grass: canvasTexture((ctx, w, h) => {
          ctx.fillStyle = "#777a4b";
          ctx.fillRect(0, 0, w, h);
          for (let i = 0; i < 1300; i++) {
            const v = 70 + rnd(i) * 55;
            ctx.fillStyle = `rgba(${v}, ${95 + rnd(i + 2) * 45}, ${50 + rnd(i + 4) * 25}, ${0.18 + rnd(i + 6) * 0.3})`;
            ctx.fillRect(rnd(i + 8) * w, rnd(i + 10) * h, 2 + rnd(i + 12) * 5, 1 + rnd(i + 14) * 4);
          }
        }, 9),
        road: canvasTexture((ctx, w, h) => {
          ctx.fillStyle = "#343433";
          ctx.fillRect(0, 0, w, h);
          for (let i = 0; i < 1700; i++) {
            const c = 42 + rnd(i) * 34;
            ctx.fillStyle = `rgba(${c}, ${c}, ${c}, ${0.22 + rnd(i + 1) * 0.36})`;
            ctx.fillRect(rnd(i + 2) * w, rnd(i + 3) * h, 1 + rnd(i + 4) * 4, 1 + rnd(i + 5) * 4);
          }
          ctx.strokeStyle = "rgba(255,255,255,0.06)";
          ctx.lineWidth = 1;
          for (let y = 16; y < h; y += 32) {
            ctx.beginPath();
            ctx.moveTo(0, y + rnd(y) * 3);
            ctx.lineTo(w, y + rnd(y + 2) * 3);
            ctx.stroke();
          }
        }, 12),
        sidewalk: canvasTexture((ctx, w, h) => {
          ctx.fillStyle = "#8a8375";
          ctx.fillRect(0, 0, w, h);
          ctx.strokeStyle = "rgba(40,35,30,0.28)";
          ctx.lineWidth = 2;
          for (let x = 0; x < w; x += 32) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, h);
            ctx.stroke();
          }
          for (let y = 0; y < h; y += 32) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(w, y);
            ctx.stroke();
          }
          for (let i = 0; i < 350; i++) {
            ctx.fillStyle = `rgba(255,255,255,${rnd(i) * 0.07})`;
            ctx.fillRect(rnd(i + 1) * w, rnd(i + 2) * h, 2, 2);
          }
        }, 8),
        facade: canvasTexture((ctx, w, h) => {
          ctx.fillStyle = "#6c6f6b";
          ctx.fillRect(0, 0, w, h);
          ctx.fillStyle = "rgba(20,25,28,0.64)";
          for (let y = 16; y < h - 10; y += 30) {
            for (let x = 12; x < w - 12; x += 26) {
              ctx.fillRect(x, y, 11, 14);
              if (rnd(x * y) > 0.72) {
                ctx.fillStyle = "rgba(255,214,126,0.55)";
                ctx.fillRect(x + 2, y + 2, 7, 9);
                ctx.fillStyle = "rgba(20,25,28,0.64)";
              }
            }
          }
          ctx.strokeStyle = "rgba(255,255,255,0.08)";
          ctx.strokeRect(0, 0, w, h);
        }, 3)
      };
    }

    function canvasTexture(draw, repeat = 1) {
      const canvas = document.createElement("canvas");
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext("2d");
      draw(ctx, canvas.width, canvas.height);
      const tex = new THREE.CanvasTexture(canvas);
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(repeat, repeat);
      tex.magFilter = THREE.NearestFilter;
      tex.minFilter = THREE.NearestMipmapNearestFilter;
      return tex;
    }

    function isRoad(x, z) {
      const gx = Math.abs(((x + ROAD_EVERY / 2) % ROAD_EVERY) - ROAD_EVERY / 2);
      const gz = Math.abs(((z + ROAD_EVERY / 2) % ROAD_EVERY) - ROAD_EVERY / 2);
      return gx < ROAD_W / 2 || gz < ROAD_W / 2;
    }

    function makeBox(w, h, d, mat, x, y, z, cast = true) {
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
      mesh.position.set(x, y, z);
      mesh.castShadow = cast;
      mesh.receiveShadow = true;
      scene.add(mesh);
      return mesh;
    }

    function spawnCity() {
      const sky = new THREE.Mesh(
        new THREE.SphereGeometry(WORLD * 0.72, 24, 12),
        new THREE.MeshBasicMaterial({ map: createSkyTexture(), side: THREE.BackSide, depthWrite: false })
      );
      sky.position.y = 90;
      scene.add(sky);

      const ground = new THREE.Mesh(new THREE.PlaneGeometry(WORLD, WORLD), groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      scene.add(ground);

      for (let i = -WORLD / 2; i <= WORLD / 2; i += ROAD_EVERY) {
        makeBox(ROAD_W, 0.08, WORLD, roadMat, i, 0.02, 0, false);
        makeBox(WORLD, 0.08, ROAD_W, roadMat, 0, 0.025, i, false);
        makeBox(3, 0.09, WORLD, lineMat, i, 0.07, 0, false);
        makeBox(WORLD, 0.09, 3, lineMat, 0, 0.075, i, false);
        makeBox(ROAD_W + 22, 0.06, WORLD, sidewalkMat, i, 0.0, 0, false);
        makeBox(WORLD, 0.06, ROAD_W + 22, sidewalkMat, 0, 0.0, i, false);
      }

      for (let ix = -WORLD / 2 + 90; ix < WORLD / 2 - 90; ix += 145) {
        for (let iz = -WORLD / 2 + 90; iz < WORLD / 2 - 90; iz += 145) {
          if (isRoad(ix, iz) || rnd(ix + iz) < 0.25) continue;
          const w = 48 + rnd(ix * 2 + iz) * 54;
          const d = 48 + rnd(ix + iz * 2) * 54;
          const h = 26 + rnd(ix * iz) * 120;
          const mat = new THREE.MeshStandardMaterial({
            color: [0x8b8274, 0x787f85, 0x6e818c, 0x808773, 0x747486][Math.floor(rnd(ix - iz) * 5)],
            map: textures.facade,
            roughness: 0.88,
            metalness: 0.03
          });
          const b = makeBox(w, h, d, mat, ix, h / 2, iz);
          b.userData.solid = true;
          colliders.push({ mesh: b, x: ix, z: iz, w, d });

          const roof = makeBox(w * 0.92, 1.5, d * 0.92, new THREE.MeshStandardMaterial({ color: 0x272a2a, roughness: 0.8 }), ix, h + 1, iz, false);
          roof.receiveShadow = false;
          if (rnd(ix + iz * 4) > 0.72) {
            const sign = makeBox(w * 0.5, 5, 1, new THREE.MeshBasicMaterial({ color: [0xffc857, 0x3dd6d0, 0xff6b6b][Math.floor(rnd(ix) * 3)] }), ix, Math.min(h - 8, 22), iz - d / 2 - 0.8, false);
            sign.rotation.y = 0;
          }
        }
      }

      for (let i = 0; i < 34; i++) {
        const a = (i / 34) * Math.PI * 2;
        const dist = WORLD * 0.46;
        const h = 120 + rnd(i) * 260;
        const w = 60 + rnd(i + 2) * 90;
        makeBox(w, h, w * 0.8, new THREE.MeshStandardMaterial({ color: 0x6c7071, roughness: 0.95 }), Math.sin(a) * dist, h / 2 - 8, Math.cos(a) * dist, false);
      }

      for (let i = 0; i < 190; i++) {
        const vertical = rnd(i) > 0.5;
        const lane = Math.floor(rnd(i + 4) * 9 - 4) * ROAD_EVERY + (rnd(i + 7) - 0.5) * 24;
        const along = -WORLD / 2 + 80 + rnd(i + 3) * (WORLD - 160);
        const x = vertical ? lane : along;
        const z = vertical ? along : lane;
        if (rnd(i + 11) > 0.52) spawnLamp(x + 38, z + 38);
        else spawnTree(x + 38, z + 38);
      }
    }

    function createSkyTexture() {
      const canvas = document.createElement("canvas");
      canvas.width = 512;
      canvas.height = 256;
      const ctx = canvas.getContext("2d");
      const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
      g.addColorStop(0, "#5f7fa3");
      g.addColorStop(0.48, "#d3a978");
      g.addColorStop(1, "#f0c987");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "rgba(255,235,190,0.5)";
      ctx.beginPath();
      ctx.arc(400, 70, 38, 0, Math.PI * 2);
      ctx.fill();
      for (let i = 0; i < 60; i++) {
        ctx.fillStyle = `rgba(255,255,255,${0.04 + rnd(i) * 0.08})`;
        ctx.fillRect(rnd(i + 2) * 512, rnd(i + 3) * 160, 24 + rnd(i + 4) * 70, 3 + rnd(i + 5) * 10);
      }
      const tex = new THREE.CanvasTexture(canvas);
      tex.magFilter = THREE.LinearFilter;
      tex.minFilter = THREE.LinearMipmapLinearFilter;
      return tex;
    }

    function spawnLamp(x, z) {
      const pole = makeBox(1.2, 13, 1.2, new THREE.MeshLambertMaterial({ color: 0x30302d }), x, 6.5, z);
      const bulb = new THREE.Mesh(new THREE.SphereGeometry(2.8, 8, 6), new THREE.MeshBasicMaterial({ color: 0xffd782 }));
      bulb.position.set(x, 14, z);
      scene.add(bulb);
      return pole;
    }

    function spawnTree(x, z) {
      makeBox(3, 12, 3, new THREE.MeshLambertMaterial({ color: 0x4a3123 }), x, 6, z);
      const top = new THREE.Mesh(new THREE.ConeGeometry(12, 26, 7), new THREE.MeshLambertMaterial({ color: 0x3f6e45 }));
      top.position.set(x, 22, z);
      top.castShadow = true;
      scene.add(top);
    }

    function makeVehicle(x, z, police = false) {
      const group = new THREE.Group();
      group.position.set(x, 0.55, z);
      group.rotation.y = rnd(x + z) * Math.PI * 2;

      const bodyMat = new THREE.MeshStandardMaterial({
        color: police ? 0xe9ebe2 : [0xb64234, 0x27689a, 0xdbb94c, 0x394044, 0x6f8b58][Math.floor(rnd(x) * 5)],
        roughness: 0.48,
        metalness: 0.18
      });
      const darkMat = new THREE.MeshStandardMaterial({ color: 0x151c20, roughness: 0.45, metalness: 0.25 });
      const tireMat = new THREE.MeshStandardMaterial({ color: 0x070707, roughness: 0.85 });
      const body = new THREE.Mesh(new THREE.BoxGeometry(18, 4.6, 31), bodyMat);
      body.position.y = 3.3;
      body.castShadow = true;
      group.add(body);

      const hood = new THREE.Mesh(new THREE.BoxGeometry(16, 3.2, 12), bodyMat);
      hood.position.set(0, 5.1, -12);
      hood.castShadow = true;
      group.add(hood);

      const trunk = new THREE.Mesh(new THREE.BoxGeometry(16, 3, 8), bodyMat);
      trunk.position.set(0, 5, 13);
      trunk.castShadow = true;
      group.add(trunk);

      const cabin = new THREE.Mesh(new THREE.BoxGeometry(13, 6, 13), darkMat);
      cabin.position.set(0, 8, -1);
      cabin.castShadow = true;
      group.add(cabin);

      for (const sx of [-8.8, 8.8]) {
        for (const sz of [-11, 11]) {
          const wheel = new THREE.Mesh(new THREE.CylinderGeometry(3.2, 3.2, 2.2, 10), tireMat);
          wheel.rotation.z = Math.PI / 2;
          wheel.position.set(sx, 2, sz);
          wheel.castShadow = true;
          group.add(wheel);
        }
      }

      const bumperMat = new THREE.MeshStandardMaterial({ color: 0xd4d0c2, roughness: 0.32, metalness: 0.55 });
      const frontBumper = new THREE.Mesh(new THREE.BoxGeometry(17, 2, 1.6), bumperMat);
      frontBumper.position.set(0, 2.6, -16.6);
      group.add(frontBumper);
      const rearBumper = new THREE.Mesh(new THREE.BoxGeometry(17, 2, 1.6), bumperMat);
      rearBumper.position.set(0, 2.6, 16.6);
      group.add(rearBumper);

      const headMat = new THREE.MeshBasicMaterial({ color: 0xffe4a0 });
      const tailMat = new THREE.MeshBasicMaterial({ color: 0xff322f });
      for (const sx of [-5.5, 5.5]) {
        const head = new THREE.Mesh(new THREE.BoxGeometry(4, 1.3, 0.6), headMat);
        head.position.set(sx, 4.2, -17.6);
        group.add(head);
        const tail = new THREE.Mesh(new THREE.BoxGeometry(4, 1.3, 0.6), tailMat);
        tail.position.set(sx, 4.2, 17.6);
        group.add(tail);
      }

      if (police) {
        const bar = new THREE.Mesh(new THREE.BoxGeometry(9, 1.2, 2.5), new THREE.MeshBasicMaterial({ color: 0x224dff }));
        bar.position.set(0, 12, -3);
        group.add(bar);
        const stripe = new THREE.Mesh(new THREE.BoxGeometry(18.4, 0.2, 5), new THREE.MeshBasicMaterial({ color: 0x1c3047 }));
        stripe.position.set(0, 5.7, 4);
        group.add(stripe);
      }

      scene.add(group);
      const car = {
        group,
        body,
        police,
        occupied: false,
        ai: true,
        hp: police ? 150 : 100,
        speed: 18 + rnd(x - z) * 24,
        turnTimer: rnd(x + z) * 2
      };
      vehicles.push(car);
      if (police) cops.push(car);
      return car;
    }

    function makePedestrian(x, z) {
      const group = new THREE.Group();
      group.position.set(x, 0, z);
      const color = [0xc98b6a, 0x8fb6cf, 0xb9a36c, 0x8aa66a, 0xaf7b91][Math.floor(rnd(x + z) * 5)];
      const cloth = new THREE.MeshStandardMaterial({ color, roughness: 0.78 });
      const skin = new THREE.MeshStandardMaterial({ color: 0xd9b38d, roughness: 0.72 });
      const dark = new THREE.MeshStandardMaterial({ color: 0x25211f, roughness: 0.8 });
      const torso = new THREE.Mesh(new THREE.BoxGeometry(3.5, 5.4, 2.3), cloth);
      torso.position.y = 5.8;
      torso.castShadow = true;
      group.add(torso);
      const head = new THREE.Mesh(new THREE.BoxGeometry(2.7, 2.7, 2.7), skin);
      head.position.y = 10.2;
      head.castShadow = true;
      group.add(head);
      const hair = new THREE.Mesh(new THREE.BoxGeometry(2.9, 0.9, 2.9), dark);
      hair.position.y = 11.45;
      hair.castShadow = true;
      group.add(hair);
      const leftArm = new THREE.Mesh(new THREE.BoxGeometry(1.1, 4.8, 1), skin);
      const rightArm = leftArm.clone();
      leftArm.position.set(-2.5, 5.5, 0);
      rightArm.position.set(2.5, 5.5, 0);
      leftArm.castShadow = true;
      rightArm.castShadow = true;
      group.add(leftArm, rightArm);
      const leftLeg = new THREE.Mesh(new THREE.BoxGeometry(1.2, 4.5, 1.1), dark);
      const rightLeg = leftLeg.clone();
      leftLeg.position.set(-0.85, 2.2, 0);
      rightLeg.position.set(0.85, 2.2, 0);
      leftLeg.castShadow = true;
      rightLeg.castShadow = true;
      group.add(leftLeg, rightLeg);
      scene.add(group);
      const ped = {
        group,
        limbs: { leftArm, rightArm, leftLeg, rightLeg },
        hp: 40,
        angle: rnd(x * z) * Math.PI * 2,
        speed: 9 + rnd(x - z) * 8,
        stride: rnd(x + z + 99) * Math.PI * 2,
        panic: 0,
        dead: false
      };
      pedestrians.push(ped);
      return ped;
    }

    function spawnActors() {
      for (let i = 0; i < 70; i++) {
        const vertical = rnd(i) > 0.5;
        const lane = Math.floor(rnd(i + 14) * 9 - 4) * ROAD_EVERY + (rnd(i + 17) - 0.5) * 28;
        const along = -WORLD / 2 + 110 + rnd(i + 23) * (WORLD - 220);
        makeVehicle(vertical ? lane : along, vertical ? along : lane, false);
      }
      for (let i = 0; i < 7; i++) {
        makeVehicle(-700 + i * 80, -780 + i * 120, true);
      }
      for (let i = 0; i < 85; i++) {
        let x = -WORLD / 2 + 80 + rnd(i + 50) * (WORLD - 160);
        let z = -WORLD / 2 + 80 + rnd(i + 80) * (WORLD - 160);
        if (!isRoad(x, z)) {
          x = Math.round(x / ROAD_EVERY) * ROAD_EVERY + 44;
          z += (rnd(i + 12) - 0.5) * 90;
        }
        makePedestrian(x, z);
      }
    }

    function collides(x, z, radius) {
      for (const c of colliders) {
        if (Math.abs(x - c.x) < c.w / 2 + radius && Math.abs(z - c.z) < c.d / 2 + radius) return true;
      }
      return false;
    }

    function tryMove(pos, dx, dz, radius) {
      const nx = clamp(pos.x + dx, -WORLD / 2 + radius, WORLD / 2 - radius);
      const nz = clamp(pos.z + dz, -WORLD / 2 + radius, WORLD / 2 - radius);
      if (!collides(nx, pos.z, radius)) pos.x = nx;
      if (!collides(pos.x, nz, radius)) pos.z = nz;
    }

    function enterExitCar() {
      if (player.car) {
        const car = player.car;
        car.occupied = false;
        car.ai = false;
        player.pos.copy(car.group.position);
        player.pos.y = 1.8;
        player.pos.x += Math.sin(player.yaw + Math.PI / 2) * 12;
        player.pos.z += Math.cos(player.yaw + Math.PI / 2) * 12;
        player.car = null;
        missionEl.textContent = "On foot. Mouse look and shoot through the city streets.";
        return;
      }
      let best = null;
      let bestD = 22;
      for (const car of vehicles) {
        const d = car.group.position.distanceTo(player.pos);
        if (!car.occupied && d < bestD) {
          best = car;
          bestD = d;
        }
      }
      if (!best) {
        missionEl.textContent = "No vehicle nearby. Walk closer to a car.";
        return;
      }
      player.car = best;
      best.occupied = true;
      best.ai = false;
      player.yaw = best.group.rotation.y;
      missionEl.textContent = "Driving. Use WASD or GAS, steer with look, E to exit.";
    }

    function shoot() {
      if (player.shootCd > 0 || player.reloadCd > 0 || player.ammo <= 0) return;
      player.shootCd = player.car ? 0.12 : 0.16;
      player.ammo--;
      player.wanted = clamp(player.wanted + 0.12, 0, 5);
      weaponEl.classList.remove("recoil");
      void weaponEl.offsetWidth;
      weaponEl.classList.add("recoil");

      raycaster.setFromCamera(center, camera);
      const targets = [
        ...pedestrians.filter(p => !p.dead).map(p => p.group),
        ...vehicles.filter(v => v !== player.car).map(v => v.group)
      ];
      const hit = raycaster.intersectObjects(targets, true)[0];
      const origin = camera.position.clone();
      const direction = new THREE.Vector3();
      camera.getWorldDirection(direction);
      const bulletMesh = new THREE.Mesh(
        new THREE.BoxGeometry(0.35, 0.35, 3.2),
        new THREE.MeshBasicMaterial({ color: 0xffe08a })
      );
      bulletMesh.position.copy(origin);
      bulletMesh.lookAt(origin.clone().add(direction));
      scene.add(bulletMesh);
      bullets.push({ pos: origin.clone(), vel: direction.clone().multiplyScalar(360), life: 0.7, mesh: bulletMesh });
      spawnMuzzle(origin, direction);

      if (hit && hit.distance < 180) {
        const targetGroup = findTargetGroup(hit.object);
        const ped = pedestrians.find(p => p.group === targetGroup);
        const car = vehicles.find(v => v.group === targetGroup);
        if (ped && !ped.dead) {
          ped.hp -= 35;
          ped.panic = 4;
          spawnImpact(hit.point, 0xc43e35);
          if (ped.hp <= 0) {
            ped.dead = true;
            ped.group.visible = false;
          }
          player.wanted = clamp(player.wanted + 0.35, 0, 5);
        }
        if (car) {
          car.hp -= 22;
          spawnImpact(hit.point, 0xffb447);
          if (car.hp <= 0) {
            car.ai = false;
            car.speed = 0;
            spawnExplosion(car.group.position);
          }
          player.wanted = clamp(player.wanted + 0.2, 0, 5);
        }
      }
    }

    function findTargetGroup(obj) {
      let o = obj;
      while (o && o.parent && o.parent !== scene) o = o.parent;
      return o;
    }

    function melee() {
      if (player.meleeCd > 0 || player.car) return;
      player.meleeCd = 0.45;
      const forward = new THREE.Vector3(-Math.sin(player.yaw), 0, -Math.cos(player.yaw));
      const hitPos = player.pos.clone().add(forward.multiplyScalar(8));
      for (const ped of pedestrians) {
        if (ped.dead) continue;
        if (ped.group.position.distanceTo(hitPos) < 7) {
          ped.hp -= 30;
          ped.panic = 4;
          spawnImpact(ped.group.position, 0xf0d070);
          player.wanted = clamp(player.wanted + 0.35, 0, 5);
          if (ped.hp <= 0) {
            ped.dead = true;
            ped.group.visible = false;
          }
        }
      }
    }

    function reload() {
      if (player.reloadCd > 0 || player.ammo >= 48) return;
      player.reloadCd = 0.9;
      missionEl.textContent = "Reloading...";
      setTimeout(() => {
        player.ammo = 48;
        missionEl.textContent = "Reloaded.";
      }, 760);
    }

    function damagePlayer(amount) {
      const armorHit = Math.min(player.armor, amount * 0.65);
      player.armor -= armorHit;
      player.health = clamp(player.health - (amount - armorHit), 0, 100);
      if (player.health <= 0) {
        player.health = 100;
        player.armor = 25;
        player.pos.set(0, 1.8, 0);
        if (player.car) {
          player.car.occupied = false;
          player.car = null;
        }
        player.wanted = Math.max(0, player.wanted - 2);
        missionEl.textContent = "Busted. Respawned downtown.";
      }
    }

    function updatePlayer(dt) {
      player.shootCd = Math.max(0, player.shootCd - dt);
      player.meleeCd = Math.max(0, player.meleeCd - dt);
      player.reloadCd = Math.max(0, player.reloadCd - dt);
      player.wanted = Math.max(0, player.wanted - dt * 0.025);

      player.yaw -= input.lookX * dt * 1.8;
      player.pitch = clamp(player.pitch - input.lookY * dt * 1.3, -1.1, 0.85);

      if (player.car) {
        const car = player.car;
        const gas = keys.has("w") || keys.has("arrowup") || input.y < -0.2 || input.gas ? 1 : 0;
        const brake = keys.has("s") || keys.has("arrowdown") || input.y > 0.35 ? 1 : 0;
        const steer = (keys.has("a") || keys.has("arrowleft") ? 1 : 0) - (keys.has("d") || keys.has("arrowright") ? 1 : 0) - input.x;
        car.speed += gas * 80 * dt;
        car.speed -= brake * 90 * dt;
        car.speed *= Math.pow(keys.has(" ") ? 0.92 : 0.982, dt * 60);
        car.speed = clamp(car.speed, -34, input.gas ? 92 : 68);
        car.group.rotation.y += steer * (1.1 + Math.abs(car.speed) * 0.025) * dt * Math.sign(car.speed || 1);
        player.yaw += (car.group.rotation.y - player.yaw) * Math.min(1, dt * 7);
        const dx = -Math.sin(car.group.rotation.y) * car.speed * dt;
        const dz = -Math.cos(car.group.rotation.y) * car.speed * dt;
        tryMove(car.group.position, dx, dz, 10);
        player.pos.copy(car.group.position);
        player.pos.y = 5.8;

        for (const ped of pedestrians) {
          if (ped.dead) continue;
          if (ped.group.position.distanceTo(car.group.position) < 9 && Math.abs(car.speed) > 22) {
            ped.hp -= Math.abs(car.speed) * 0.7;
            ped.panic = 5;
            spawnImpact(ped.group.position, 0xc43e35);
            player.wanted = clamp(player.wanted + 0.16, 0, 5);
            if (ped.hp <= 0) {
              ped.dead = true;
              ped.group.visible = false;
            }
          }
        }
      } else {
        const x = (keys.has("d") || keys.has("arrowright") ? 1 : 0) - (keys.has("a") || keys.has("arrowleft") ? 1 : 0) + input.x;
        const y = (keys.has("s") || keys.has("arrowdown") ? 1 : 0) - (keys.has("w") || keys.has("arrowup") ? 1 : 0) + input.y;
        const mag = Math.hypot(x, y);
        if (mag > 0.05) {
          const speed = keys.has("shift") ? 54 : 34;
          const forward = new THREE.Vector3(-Math.sin(player.yaw), 0, -Math.cos(player.yaw));
          const right = new THREE.Vector3(Math.cos(player.yaw), 0, -Math.sin(player.yaw));
          const move = forward.multiplyScalar(-y / Math.max(1, mag)).add(right.multiplyScalar(x / Math.max(1, mag)));
          tryMove(player.pos, move.x * speed * dt, move.z * speed * dt, 3.2);
        }
      }

      if (input.fire) shoot();
      camera.position.copy(player.pos);
      if (player.car) {
        camera.position.y += 7;
        camera.position.x += Math.sin(player.yaw) * 7;
        camera.position.z += Math.cos(player.yaw) * 7;
      }
      camera.rotation.order = "YXZ";
      camera.rotation.y = player.yaw;
      camera.rotation.x = player.pitch;
    }

    function updateTraffic(dt) {
      for (const car of vehicles) {
        if (!car.ai || car.occupied || car.hp <= 0) continue;
        const pos = car.group.position;
        if (car.police && player.wanted > 0.6) {
          const target = player.car ? player.car.group.position : player.pos;
          const angle = Math.atan2(-(target.x - pos.x), -(target.z - pos.z));
          car.group.rotation.y += angleDiff(angle, car.group.rotation.y) * Math.min(1, dt * 1.7);
          car.speed += (60 - car.speed) * dt;
          if (pos.distanceTo(target) < 16) damagePlayer(14 * dt);
        } else {
          car.turnTimer -= dt;
          if (car.turnTimer <= 0) {
            car.turnTimer = 1.5 + rnd(performance.now() + pos.x) * 3;
            if (rnd(pos.x + pos.z + performance.now()) > 0.78) car.group.rotation.y += (rnd(pos.x) > 0.5 ? 1 : -1) * Math.PI / 2;
          }
          car.speed += ((18 + rnd(pos.x + pos.z) * 20) - car.speed) * dt;
        }
        tryMove(pos, -Math.sin(car.group.rotation.y) * car.speed * dt, -Math.cos(car.group.rotation.y) * car.speed * dt, 10);
      }

      if (player.wanted > 1.4 && cops.length < 12 && rnd(performance.now()) > 0.985) {
        const a = rnd(performance.now() + 3) * Math.PI * 2;
        const d = 260 + rnd(performance.now() + 5) * 160;
        const x = clamp(player.pos.x + Math.sin(a) * d, -WORLD / 2 + 60, WORLD / 2 - 60);
        const z = clamp(player.pos.z + Math.cos(a) * d, -WORLD / 2 + 60, WORLD / 2 - 60);
        makeVehicle(x, z, true);
      }
    }

    function updatePedestrians(dt) {
      const target = player.car ? player.car.group.position : player.pos;
      for (const ped of pedestrians) {
        if (ped.dead) continue;
        const pos = ped.group.position;
        const d = pos.distanceTo(target);
        if (d < 38 && player.wanted > 0.3) ped.panic = Math.max(ped.panic, 3);
        if (ped.panic > 0) {
          ped.angle = Math.atan2(pos.x - target.x, pos.z - target.z);
          ped.panic -= dt;
        } else if (rnd(Math.floor(performance.now() / 900) + pos.x) > 0.985) {
          ped.angle += (rnd(pos.z + performance.now()) - 0.5) * 1.2;
        }
        const speed = ped.panic > 0 ? ped.speed * 2.4 : ped.speed;
        tryMove(pos, Math.sin(ped.angle) * speed * dt, Math.cos(ped.angle) * speed * dt, 2.5);
        ped.group.rotation.y = ped.angle;
        ped.stride += dt * speed * 0.55;
        const swing = Math.sin(ped.stride) * (ped.panic > 0 ? 0.72 : 0.42);
        ped.limbs.leftArm.rotation.x = swing;
        ped.limbs.rightArm.rotation.x = -swing;
        ped.limbs.leftLeg.rotation.x = -swing;
        ped.limbs.rightLeg.rotation.x = swing;
        ped.group.position.y = Math.abs(Math.sin(ped.stride * 2)) * (ped.panic > 0 ? 0.22 : 0.1);
      }
    }

    function angleDiff(a, b) {
      let d = a - b;
      while (d > Math.PI) d -= Math.PI * 2;
      while (d < -Math.PI) d += Math.PI * 2;
      return d;
    }

    function updateEffects(dt) {
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.pos.addScaledVector(b.vel, dt);
        b.life -= dt;
        b.mesh.position.copy(b.pos);
        if (b.life <= 0) {
          scene.remove(b.mesh);
          bullets.splice(i, 1);
        }
      }
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= dt;
        p.mesh.position.addScaledVector(p.vel, dt);
        p.mesh.scale.multiplyScalar(Math.pow(0.94, dt * 60));
        if (p.life <= 0) {
          scene.remove(p.mesh);
          particles.splice(i, 1);
        }
      }
    }

    function spawnMuzzle(origin, dir) {
      const pos = origin.clone().add(dir.clone().multiplyScalar(3.4));
      spawnParticle(pos, 0xffd16c, 0.12, dir.clone().multiplyScalar(16));
    }

    function spawnImpact(point, color) {
      for (let i = 0; i < 9; i++) {
        const vel = new THREE.Vector3(rnd(i + point.x) - 0.5, rnd(i + point.y) * 0.8, rnd(i + point.z) - 0.5).multiplyScalar(18);
        spawnParticle(point, color, 0.35 + rnd(i) * 0.2, vel);
      }
    }

    function spawnExplosion(pos) {
      for (let i = 0; i < 28; i++) {
        const vel = new THREE.Vector3(rnd(i) - 0.5, rnd(i + 9), rnd(i + 18) - 0.5).multiplyScalar(42);
        spawnParticle(pos.clone().add(new THREE.Vector3(0, 5, 0)), i % 2 ? 0xff5d38 : 0xffc15a, 0.65, vel);
      }
    }

    function spawnParticle(pos, color, life, vel) {
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), new THREE.MeshBasicMaterial({ color }));
      mesh.position.copy(pos);
      scene.add(mesh);
      particles.push({ mesh, life, vel });
    }

    function updateHud() {
      healthEl.style.width = `${player.health}%`;
      armorEl.style.width = `${player.armor}%`;
      ammoEl.textContent = player.reloadCd > 0 ? "..." : player.ammo;
      modeEl.textContent = player.car ? "Driving" : "On foot";
      weaponEl.classList.toggle("driving", !!player.car);
      starsEl.innerHTML = "";
      const full = Math.ceil(player.wanted);
      for (let i = 1; i <= 5; i++) {
        const el = document.createElement(i <= full ? "b" : "span");
        el.textContent = "★";
        starsEl.appendChild(el);
      }
    }

    function loop() {
      const dt = Math.min(clock.getDelta(), 0.033);
      updatePlayer(dt);
      updateTraffic(dt);
      updatePedestrians(dt);
      updateEffects(dt);
      updateHud();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function bindStick(id, knobId, onMove, onEnd) {
      const el = document.getElementById(id);
      const knob = document.getElementById(knobId);
      function move(e) {
        e.preventDefault();
        el.setPointerCapture(e.pointerId);
        const rect = el.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const dx = e.clientX - cx;
        const dy = e.clientY - cy;
        const mag = Math.hypot(dx, dy) || 1;
        const max = rect.width * 0.34;
        const m = Math.min(max, mag);
        const nx = dx / mag;
        const ny = dy / mag;
        knob.style.transform = `translate(${nx * m}px, ${ny * m}px)`;
        onMove(nx * (m / max), ny * (m / max));
      }
      function end() {
        knob.style.transform = "translate(0, 0)";
        onEnd();
      }
      el.addEventListener("pointerdown", move);
      el.addEventListener("pointermove", move);
      el.addEventListener("pointerup", end);
      el.addEventListener("pointercancel", end);
    }

    function bindHold(id, down, up) {
      const el = document.getElementById(id);
      el.addEventListener("pointerdown", e => {
        e.preventDefault();
        el.setPointerCapture(e.pointerId);
        down();
      });
      el.addEventListener("pointerup", up);
      el.addEventListener("pointercancel", up);
    }

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    addEventListener("keydown", e => {
      const k = e.key.toLowerCase();
      keys.add(k);
      if (k === "e") enterExitCar();
      if (k === "f") melee();
      if (k === "r") reload();
    });
    addEventListener("keyup", e => keys.delete(e.key.toLowerCase()));
    addEventListener("click", () => {
      renderer.domElement.requestPointerLock?.();
    });
    addEventListener("mousemove", e => {
      if (document.pointerLockElement === renderer.domElement) {
        player.yaw -= e.movementX * 0.0022;
        player.pitch = clamp(player.pitch - e.movementY * 0.002, -1.1, 0.85);
      }
    });
    addEventListener("mousedown", e => {
      if (e.button === 0) input.fire = true;
    });
    addEventListener("mouseup", () => {
      input.fire = false;
    });

    bindStick("stick", "moveKnob", (x, y) => {
      input.x = x;
      input.y = y;
    }, () => {
      input.x = 0;
      input.y = 0;
    });
    bindStick("look", "lookKnob", (x, y) => {
      input.lookX = x;
      input.lookY = y;
    }, () => {
      input.lookX = 0;
      input.lookY = 0;
    });
    bindHold("fireBtn", () => { input.fire = true; }, () => { input.fire = false; });
    bindHold("gasBtn", () => { input.gas = true; }, () => { input.gas = false; });
    document.getElementById("hitBtn").addEventListener("pointerdown", e => {
      e.preventDefault();
      melee();
    });
    document.getElementById("carBtn").addEventListener("pointerdown", e => {
      e.preventDefault();
      enterExitCar();
    });

    spawnCity();
    spawnActors();
    updateHud();
    loop();
  </script>
</body>
</html>
