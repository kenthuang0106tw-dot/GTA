<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Open City Crime Prototype</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #05080a;
      color: #f5f2e9;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: #05080a;
      user-select: none;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #0b1417;
    }

    .hud {
      position: fixed;
      inset: 14px 14px auto 14px;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      pointer-events: none;
    }

    .cluster {
      display: grid;
      gap: 8px;
    }

    .panel {
      min-width: 166px;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      background: rgba(6, 9, 11, 0.72);
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(12px);
    }

    .brand {
      margin: 0 0 8px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff8df;
    }

    .stat {
      display: grid;
      grid-template-columns: 64px 1fr;
      align-items: center;
      gap: 8px;
      min-height: 22px;
      color: #d9d1c0;
      font-size: 12px;
    }

    .bar {
      height: 7px;
      overflow: hidden;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.14);
    }

    .bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #40b27a, #eec653);
      width: 100%;
    }

    .stars {
      display: flex;
      gap: 2px;
      color: rgba(255, 255, 255, 0.24);
      font-size: 18px;
      line-height: 1;
    }

    .stars b {
      color: #f5d05b;
      font-weight: 900;
      text-shadow: 0 0 12px rgba(245, 208, 91, 0.6);
    }

    .mission {
      width: min(360px, calc(100vw - 28px));
      color: #efe5c8;
      font-size: 12px;
      line-height: 1.45;
    }

    .mini {
      width: 136px;
      height: 136px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      background: rgba(6, 9, 11, 0.78);
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(12px);
    }

    .help {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 25;
      transform: translateX(-50%);
      width: min(720px, calc(100vw - 28px));
      padding: 9px 12px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(6, 9, 11, 0.68);
      color: #ddd3bf;
      font-size: 12px;
      text-align: center;
      backdrop-filter: blur(12px);
      pointer-events: none;
    }

    .touch {
      position: fixed;
      inset: auto 0 0;
      z-index: 40;
      display: none;
      justify-content: space-between;
      align-items: flex-end;
      padding: 18px max(18px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
      pointer-events: none;
    }

    .stick {
      width: 132px;
      height: 132px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      background: rgba(6, 9, 11, 0.42);
      position: relative;
      backdrop-filter: blur(10px);
      pointer-events: auto;
    }

    .knob {
      position: absolute;
      left: 45px;
      top: 45px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(255, 246, 219, 0.88);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.38);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, 60px);
      grid-auto-rows: 60px;
      gap: 10px;
      pointer-events: auto;
    }

    button {
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 50%;
      background: rgba(6, 9, 11, 0.62);
      color: #fff5d8;
      font-size: 13px;
      font-weight: 800;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.36);
      backdrop-filter: blur(10px);
    }

    button:active {
      transform: translateY(1px) scale(0.98);
      background: rgba(86, 53, 36, 0.74);
    }

    @media (pointer: coarse), (max-width: 800px) {
      .hud {
        inset: 10px 10px auto 10px;
      }

      .panel {
        min-width: 142px;
        padding: 9px 10px;
      }

      .mission {
        display: none;
      }

      .mini {
        width: 104px;
        height: 104px;
      }

      .help {
        display: none;
      }

      .touch {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div class="hud" aria-hidden="true">
    <div class="cluster">
      <div class="panel">
        <p class="brand">Open City</p>
        <div class="stat"><span>Health</span><div class="bar"><span id="healthBar"></span></div></div>
        <div class="stat"><span>Armor</span><div class="bar"><span id="armorBar"></span></div></div>
        <div class="stat"><span>Ammo</span><strong id="ammoText">60</strong></div>
        <div class="stat"><span>Mode</span><strong id="modeText">Street</strong></div>
      </div>
      <div class="panel mission" id="missionText">Find a car, explore the city, and survive the wanted level.</div>
    </div>
    <div class="cluster">
      <canvas id="mini" class="mini"></canvas>
      <div class="panel">
        <div class="stars" id="stars"></div>
      </div>
    </div>
  </div>

  <div class="help">WASD drive/walk | Mouse aim | Click shoot | F melee | E enter/exit | Shift sprint | Space handbrake/boost | R reload</div>

  <div class="touch" aria-hidden="true">
    <div id="stick" class="stick"><div id="knob" class="knob"></div></div>
    <div class="actions">
      <button id="hitBtn" type="button">HIT</button>
      <button id="fireBtn" type="button">FIRE</button>
      <button id="carBtn" type="button">CAR</button>
      <button id="boostBtn" type="button">GAS</button>
    </div>
  </div>

  <script>
    (() => {
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const mini = document.getElementById("mini");
      const miniCtx = mini.getContext("2d");
      const healthBar = document.getElementById("healthBar");
      const armorBar = document.getElementById("armorBar");
      const ammoText = document.getElementById("ammoText");
      const modeText = document.getElementById("modeText");
      const missionText = document.getElementById("missionText");
      const starsEl = document.getElementById("stars");
      const stick = document.getElementById("stick");
      const knob = document.getElementById("knob");

      const WORLD = 6800;
      const ROAD_EVERY = 540;
      const ROAD_W = 108;
      const VIEW_TILT = 0.64;
      const keys = new Set();
      const bullets = [];
      const particles = [];
      const people = [];
      const cars = [];
      const cops = [];
      const buildings = [];
      const props = [];
      const input = { x: 0, y: 0, fire: false, boost: false };
      const aim = { x: innerWidth / 2, y: innerHeight / 2 };
      let last = performance.now();
      let cameraAngle = 0;
      let shake = 0;
      let missionTimer = 0;
      let score = 0;

      const player = {
        x: WORLD / 2,
        y: WORLD / 2,
        angle: -Math.PI / 2,
        speed: 0,
        health: 100,
        armor: 35,
        ammo: 60,
        wanted: 0,
        shootCd: 0,
        meleeCd: 0,
        car: null,
        reloadCd: 0
      };

      function resize() {
        const dpr = Math.max(1, Math.min(2, devicePixelRatio || 1));
        canvas.width = Math.floor(innerWidth * dpr);
        canvas.height = Math.floor(innerHeight * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        mini.width = Math.floor(mini.clientWidth * dpr);
        mini.height = Math.floor(mini.clientHeight * dpr);
        miniCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function rnd(seed) {
        const x = Math.sin(seed * 91.17) * 10000;
        return x - Math.floor(x);
      }

      function clamp(v, a, b) {
        return Math.max(a, Math.min(b, v));
      }

      function len(x, y) {
        return Math.hypot(x, y);
      }

      function wrapAngle(a) {
        while (a > Math.PI) a -= Math.PI * 2;
        while (a < -Math.PI) a += Math.PI * 2;
        return a;
      }

      function getFocus() {
        return player.car || player;
      }

      function toScreen(x, y, z = 0) {
        const f = getFocus();
        const dx = x - f.x;
        const dy = y - f.y;
        const ca = Math.cos(-cameraAngle);
        const sa = Math.sin(-cameraAngle);
        const rx = dx * ca - dy * sa;
        const ry = dx * sa + dy * ca;
        const sx = innerWidth * 0.5 + rx + (shake ? (rnd(performance.now()) - 0.5) * shake : 0);
        const sy = innerHeight * 0.62 + ry * VIEW_TILT - z + (shake ? (rnd(performance.now() + 4) - 0.5) * shake : 0);
        return { x: sx, y: sy, depth: ry };
      }

      function pointFromScreen(sx, sy) {
        const f = getFocus();
        const rx = sx - innerWidth * 0.5;
        const ry = (sy - innerHeight * 0.62) / VIEW_TILT;
        const ca = Math.cos(cameraAngle);
        const sa = Math.sin(cameraAngle);
        return {
          x: f.x + rx * ca - ry * sa,
          y: f.y + rx * sa + ry * ca
        };
      }

      function isRoad(x, y) {
        const gx = Math.abs(((x + ROAD_EVERY / 2) % ROAD_EVERY) - ROAD_EVERY / 2);
        const gy = Math.abs(((y + ROAD_EVERY / 2) % ROAD_EVERY) - ROAD_EVERY / 2);
        return gx < ROAD_W / 2 || gy < ROAD_W / 2;
      }

      function collideBuilding(x, y, r) {
        for (const b of buildings) {
          const cx = clamp(x, b.x, b.x + b.w);
          const cy = clamp(y, b.y, b.y + b.h);
          if (len(x - cx, y - cy) < r) return true;
        }
        return false;
      }

      function moveCircle(o, dx, dy, r) {
        const nx = clamp(o.x + dx, r, WORLD - r);
        const ny = clamp(o.y + dy, r, WORLD - r);
        if (!collideBuilding(nx, o.y, r)) o.x = nx;
        if (!collideBuilding(o.x, ny, r)) o.y = ny;
      }

      function spawnWorld() {
        for (let x = 360; x < WORLD - 260; x += 310) {
          for (let y = 360; y < WORLD - 260; y += 310) {
            if (isRoad(x, y)) continue;
            if (rnd(x + y) < 0.24) continue;
            const w = 120 + rnd(x * 3 + y) * 145;
            const h = 115 + rnd(x + y * 5) * 150;
            if (isRoad(x - w / 2, y) || isRoad(x + w / 2, y) || isRoad(x, y - h / 2) || isRoad(x, y + h / 2)) continue;
            buildings.push({
              x: x - w / 2,
              y: y - h / 2,
              w,
              h,
              z: 45 + rnd(x * y) * 150,
              color: ["#242f35", "#2d3639", "#39403b", "#2c3941", "#36343b"][Math.floor(rnd(x - y) * 5)]
            });
          }
        }

        for (let i = 0; i < 140; i++) {
          const roadLine = Math.floor(rnd(i + 17) * 12) * ROAD_EVERY;
          const along = 140 + rnd(i + 31) * (WORLD - 280);
          const vertical = rnd(i + 53) > 0.5;
          cars.push({
            x: vertical ? roadLine + (rnd(i + 8) - 0.5) * 38 : along,
            y: vertical ? along : roadLine + (rnd(i + 9) - 0.5) * 38,
            angle: vertical ? (rnd(i) > 0.5 ? Math.PI / 2 : -Math.PI / 2) : (rnd(i) > 0.5 ? 0 : Math.PI),
            speed: 45 + rnd(i + 2) * 80,
            turnGoal: 0,
            color: ["#bd3d35", "#2c6ca3", "#dfbd55", "#5f8f68", "#dfdfd6", "#20272b", "#7a4d8f"][i % 7],
            police: false,
            occupied: false,
            hp: 100,
            ai: true
          });
        }

        for (let i = 0; i < 110; i++) {
          people.push({
            x: 120 + rnd(i + 5) * (WORLD - 240),
            y: 120 + rnd(i + 9) * (WORLD - 240),
            angle: rnd(i + 11) * Math.PI * 2,
            speed: 24 + rnd(i + 13) * 38,
            panic: 0,
            hp: 42,
            color: ["#d4b88b", "#9cc1d9", "#b86f6b", "#93ad76", "#b196c3"][i % 5],
            dead: false
          });
        }

        for (let i = 0; i < 8; i++) {
          cops.push(makeCop(820 + i * 120, 720 + i * 180));
        }

        for (let i = 0; i < 260; i++) {
          props.push({
            x: 70 + rnd(i + 111) * (WORLD - 140),
            y: 70 + rnd(i + 222) * (WORLD - 140),
            type: rnd(i + 333) > 0.55 ? "lamp" : "tree"
          });
        }
      }

      function makeCop(x, y) {
        return {
          x,
          y,
          angle: 0,
          speed: 0,
          color: "#101820",
          police: true,
          occupied: false,
          hp: 150,
          ai: true,
          siren: rnd(x + y) * 10
        };
      }

      function addParticle(x, y, color, n = 7, power = 90) {
        for (let i = 0; i < n; i++) {
          const a = rnd(performance.now() + i * 3) * Math.PI * 2;
          const v = power * (0.35 + rnd(i + x) * 0.9);
          particles.push({
            x,
            y,
            vx: Math.cos(a) * v,
            vy: Math.sin(a) * v,
            life: 0.35 + rnd(i + y) * 0.35,
            color,
            size: 2 + rnd(i) * 4
          });
        }
      }

      function enterExitCar() {
        if (player.car) {
          const car = player.car;
          car.occupied = false;
          car.ai = false;
          player.car = null;
          player.x = clamp(car.x + Math.cos(car.angle + Math.PI / 2) * 42, 24, WORLD - 24);
          player.y = clamp(car.y + Math.sin(car.angle + Math.PI / 2) * 42, 24, WORLD - 24);
          player.angle = car.angle;
          missionText.textContent = "On foot. Aim with mouse or right stick, then fire.";
          return;
        }

        let best = null;
        let bestD = 82;
        for (const c of cars) {
          const d = len(c.x - player.x, c.y - player.y);
          if (d < bestD && !c.occupied) {
            best = c;
            bestD = d;
          }
        }
        if (!best) {
          missionText.textContent = "No car nearby. Move closer to a vehicle.";
          missionTimer = 2.2;
          return;
        }
        player.car = best;
        best.occupied = true;
        best.ai = false;
        best.speed = Math.max(best.speed, 20);
        missionText.textContent = "Vehicle acquired. Build speed, use handbrake, avoid police.";
      }

      function melee() {
        if (player.car || player.meleeCd > 0) return;
        player.meleeCd = 0.42;
        const hx = player.x + Math.cos(player.angle) * 42;
        const hy = player.y + Math.sin(player.angle) * 42;
        for (const p of people) {
          if (p.dead) continue;
          if (len(p.x - hx, p.y - hy) < 34) {
            p.hp -= 35;
            p.panic = 4;
            addParticle(p.x, p.y, "#f1cf72", 10, 120);
            raiseWanted(0.55);
            if (p.hp <= 0) {
              p.dead = true;
              score += 50;
            }
          }
        }
      }

      function raiseWanted(v) {
        player.wanted = clamp(player.wanted + v, 0, 5);
      }

      function damagePlayer(amount) {
        const armorHit = Math.min(player.armor, amount * 0.65);
        player.armor -= armorHit;
        player.health = clamp(player.health - (amount - armorHit), 0, 100);
        shake = Math.max(shake, 8);
        if (player.health <= 0) {
          player.health = 100;
          player.armor = 25;
          player.x = WORLD / 2;
          player.y = WORLD / 2;
          if (player.car) {
            player.car.occupied = false;
            player.car = null;
          }
          player.wanted = Math.max(0, player.wanted - 2);
          missionText.textContent = "Busted. Respawned downtown.";
          missionTimer = 3;
        }
      }

      function shoot() {
        if (player.shootCd > 0 || player.reloadCd > 0 || player.ammo <= 0) return;
        const source = player.car || player;
        const base = player.car ? player.car.angle : player.angle;
        const spread = (rnd(performance.now()) - 0.5) * (player.car ? 0.08 : 0.13);
        const a = base + spread;
        bullets.push({
          x: source.x + Math.cos(a) * 36,
          y: source.y + Math.sin(a) * 36,
          vx: Math.cos(a) * 970,
          vy: Math.sin(a) * 970,
          life: 0.82,
          owner: "player"
        });
        player.ammo--;
        player.shootCd = player.car ? 0.11 : 0.16;
        shake = Math.max(shake, player.car ? 4 : 6);
        addParticle(source.x + Math.cos(a) * 34, source.y + Math.sin(a) * 34, "#ffd36d", 4, 80);
        raiseWanted(0.12);
      }

      function reload() {
        if (player.reloadCd > 0 || player.ammo >= 60) return;
        player.reloadCd = 0.85;
        missionText.textContent = "Reloading...";
        setTimeout(() => {
          player.ammo = 60;
          missionText.textContent = "Weapon ready.";
        }, 760);
      }

      function updatePlayer(dt) {
        const keyX = (keys.has("a") || keys.has("arrowleft") ? -1 : 0) + (keys.has("d") || keys.has("arrowright") ? 1 : 0);
        const keyY = (keys.has("w") || keys.has("arrowup") ? -1 : 0) + (keys.has("s") || keys.has("arrowdown") ? 1 : 0);
        const mx = clamp(keyX + input.x, -1, 1);
        const my = clamp(keyY + input.y, -1, 1);

        if (player.car) {
          const car = player.car;
          const gas = (keys.has("w") || keys.has("arrowup") || input.y < -0.25 || input.boost) ? 1 : 0;
          const brake = (keys.has("s") || keys.has("arrowdown") || input.y > 0.35) ? 1 : 0;
          const steer = clamp(keyX + input.x, -1, 1);
          const max = input.boost || keys.has(" ") ? 390 : 305;
          car.speed += gas * 500 * dt;
          car.speed -= brake * 560 * dt;
          car.speed *= Math.pow(keys.has(" ") ? 0.93 : 0.982, dt * 60);
          car.speed = clamp(car.speed, -125, max);
          car.angle += steer * (1.45 + Math.abs(car.speed) / 210) * dt * Math.sign(car.speed || 1);
          moveCircle(car, Math.cos(car.angle) * car.speed * dt, Math.sin(car.angle) * car.speed * dt, 31);
          player.x = car.x;
          player.y = car.y;
          player.angle = car.angle;
          cameraAngle += wrapAngle(car.angle - cameraAngle) * Math.min(1, dt * 4.2);

          for (const p of people) {
            if (p.dead) continue;
            const d = len(p.x - car.x, p.y - car.y);
            if (d < 38 && Math.abs(car.speed) > 95) {
              p.hp -= Math.abs(car.speed) * 0.18;
              p.panic = 5;
              addParticle(p.x, p.y, "#c4443b", 10, 130);
              raiseWanted(0.22);
              shake = Math.max(shake, 9);
              if (p.hp <= 0) {
                p.dead = true;
                score += 70;
              }
            }
          }
        } else {
          const mag = len(mx, my);
          if (mag > 0.12) {
            const a = cameraAngle + Math.atan2(my, mx);
            const speed = keys.has("shift") ? 240 : 165;
            moveCircle(player, Math.cos(a) * speed * dt, Math.sin(a) * speed * dt, 14);
          }
          const target = pointFromScreen(aim.x, aim.y);
          player.angle = Math.atan2(target.y - player.y, target.x - player.x);
          cameraAngle += wrapAngle(player.angle - cameraAngle) * Math.min(1, dt * 2.6);
        }

        if (input.fire) shoot();
        player.shootCd = Math.max(0, player.shootCd - dt);
        player.meleeCd = Math.max(0, player.meleeCd - dt);
        player.reloadCd = Math.max(0, player.reloadCd - dt);
        player.wanted = Math.max(0, player.wanted - dt * 0.025);
      }

      function updatePeople(dt) {
        const f = getFocus();
        for (const p of people) {
          if (p.dead) continue;
          const d = len(p.x - f.x, p.y - f.y);
          if (d < 230 && (player.wanted > 0.4 || (player.car && Math.abs(player.car.speed) > 150))) {
            p.panic = Math.max(p.panic, 2.8);
          }
          if (p.panic > 0) {
            p.angle = Math.atan2(p.y - f.y, p.x - f.x) + Math.sin(performance.now() / 240 + p.x) * 0.35;
            p.panic -= dt;
          } else if (rnd(Math.floor(performance.now() / 1000) + p.x) > 0.986) {
            p.angle += (rnd(p.y + performance.now()) - 0.5) * 1.1;
          }
          const speed = p.panic > 0 ? p.speed * 2.35 : p.speed;
          moveCircle(p, Math.cos(p.angle) * speed * dt, Math.sin(p.angle) * speed * dt, 10);
        }
      }

      function updateTraffic(dt) {
        for (const c of cars) {
          if (!c.ai || c.occupied || c.hp <= 0) continue;
          const nearIntersection = Math.abs((c.x % ROAD_EVERY) - ROAD_EVERY / 2) < 10 || Math.abs((c.y % ROAD_EVERY) - ROAD_EVERY / 2) < 10;
          if (nearIntersection && rnd(Math.floor(performance.now() / 800) + c.x + c.y) > 0.982) {
            c.angle += (rnd(c.x) > 0.5 ? Math.PI / 2 : -Math.PI / 2);
          }
          const desired = c.police && player.wanted > 0.5 ? 235 : 65 + rnd(c.x + c.y) * 70;
          if (c.police && player.wanted > 0.5) {
            const f = getFocus();
            const target = Math.atan2(f.y - c.y, f.x - c.x);
            c.angle += wrapAngle(target - c.angle) * Math.min(1, dt * 1.7);
          }
          c.speed += (desired - c.speed) * dt * 0.8;
          moveCircle(c, Math.cos(c.angle) * c.speed * dt, Math.sin(c.angle) * c.speed * dt, 31);

          if (c.police && player.wanted > 0.8) {
            const f = getFocus();
            if (len(c.x - f.x, c.y - f.y) < 58) {
              damagePlayer(18 * dt);
              c.speed *= 0.96;
            }
            if (rnd(performance.now() + c.x) > 0.986 && len(c.x - f.x, c.y - f.y) < 480) {
              const a = Math.atan2(f.y - c.y, f.x - c.x);
              bullets.push({
                x: c.x + Math.cos(a) * 32,
                y: c.y + Math.sin(a) * 32,
                vx: Math.cos(a) * 760,
                vy: Math.sin(a) * 760,
                life: 0.65,
                owner: "cop"
              });
            }
          }
        }

        const activeCops = cops.filter(c => c.ai).length;
        if (player.wanted > 1.2 && activeCops < 8) {
          const f = getFocus();
          const a = rnd(performance.now()) * Math.PI * 2;
          const d = 720 + rnd(performance.now() + 2) * 420;
          const cop = makeCop(clamp(f.x + Math.cos(a) * d, 100, WORLD - 100), clamp(f.y + Math.sin(a) * d, 100, WORLD - 100));
          cars.push(cop);
          cops.push(cop);
        }
      }

      function updateBullets(dt) {
        for (let i = bullets.length - 1; i >= 0; i--) {
          const b = bullets[i];
          b.x += b.vx * dt;
          b.y += b.vy * dt;
          b.life -= dt;
          let hit = b.life <= 0 || b.x < 0 || b.y < 0 || b.x > WORLD || b.y > WORLD || collideBuilding(b.x, b.y, 4);
          if (!hit && b.owner === "player") {
            for (const p of people) {
              if (!p.dead && len(p.x - b.x, p.y - b.y) < 16) {
                p.hp -= 45;
                p.panic = 5;
                addParticle(p.x, p.y, "#c4443b", 9, 120);
                hit = true;
                if (p.hp <= 0) {
                  p.dead = true;
                  score += 100;
                }
                break;
              }
            }
            for (const c of cars) {
              if (hit) break;
              if (c !== player.car && len(c.x - b.x, c.y - b.y) < 32) {
                c.hp -= 28;
                addParticle(b.x, b.y, "#ffbd63", 8, 140);
                hit = true;
                if (c.hp <= 0) {
                  c.speed = 0;
                  c.ai = false;
                  addParticle(c.x, c.y, "#ff673f", 28, 210);
                  raiseWanted(0.45);
                }
              }
            }
          } else if (!hit && b.owner === "cop") {
            const f = getFocus();
            if (len(f.x - b.x, f.y - b.y) < 25) {
              damagePlayer(9);
              addParticle(b.x, b.y, "#dbe7ff", 6, 90);
              hit = true;
            }
          }
          if (hit) bullets.splice(i, 1);
        }
      }

      function updateParticles(dt) {
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.vx *= Math.pow(0.92, dt * 60);
          p.vy *= Math.pow(0.92, dt * 60);
          p.life -= dt;
          if (p.life <= 0) particles.splice(i, 1);
        }
        shake = Math.max(0, shake - dt * 32);
        missionTimer = Math.max(0, missionTimer - dt);
        if (missionTimer <= 0 && player.wanted > 2.4) {
          missionText.textContent = "Lose the cops by leaving their line of sight.";
        } else if (missionTimer <= 0 && score > 0) {
          missionText.textContent = `Cash earned: $${score}. Keep moving through the city.`;
        }
      }

      function drawRoadGrid() {
        ctx.fillStyle = "#171a1b";
        for (let x = 0; x <= WORLD; x += ROAD_EVERY) {
          const a = toScreen(x - ROAD_W / 2, 0);
          const b = toScreen(x + ROAD_W / 2, 0);
          const c = toScreen(x + ROAD_W / 2, WORLD);
          const d = toScreen(x - ROAD_W / 2, WORLD);
          poly([a, b, c, d], "#1d2224");
          lineWorld(x, 0, x, WORLD, "rgba(241,220,153,0.16)", 3);
        }
        for (let y = 0; y <= WORLD; y += ROAD_EVERY) {
          const a = toScreen(0, y - ROAD_W / 2);
          const b = toScreen(WORLD, y - ROAD_W / 2);
          const c = toScreen(WORLD, y + ROAD_W / 2);
          const d = toScreen(0, y + ROAD_W / 2);
          poly([a, b, c, d], "#202527");
          lineWorld(0, y, WORLD, y, "rgba(241,220,153,0.16)", 3);
        }
      }

      function poly(points, color) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
        ctx.closePath();
        ctx.fill();
      }

      function lineWorld(x1, y1, x2, y2, color, width) {
        const a = toScreen(x1, y1);
        const b = toScreen(x2, y2);
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }

      function drawBuilding(b) {
        const p1 = toScreen(b.x, b.y);
        const p2 = toScreen(b.x + b.w, b.y);
        const p3 = toScreen(b.x + b.w, b.y + b.h);
        const p4 = toScreen(b.x, b.y + b.h);
        const q1 = toScreen(b.x, b.y, b.z);
        const q2 = toScreen(b.x + b.w, b.y, b.z);
        const q3 = toScreen(b.x + b.w, b.y + b.h, b.z);
        const q4 = toScreen(b.x, b.y + b.h, b.z);
        poly([p2, p3, q3, q2], shade(b.color, -22));
        poly([p3, p4, q4, q3], shade(b.color, -36));
        poly([q1, q2, q3, q4], b.color);
        ctx.strokeStyle = "rgba(255,255,255,0.08)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(q1.x, q1.y);
        ctx.lineTo(q2.x, q2.y);
        ctx.lineTo(q3.x, q3.y);
        ctx.lineTo(q4.x, q4.y);
        ctx.closePath();
        ctx.stroke();
      }

      function shade(hex, amount) {
        const n = parseInt(hex.slice(1), 16);
        const r = clamp((n >> 16) + amount, 0, 255);
        const g = clamp(((n >> 8) & 255) + amount, 0, 255);
        const b = clamp((n & 255) + amount, 0, 255);
        return `rgb(${r},${g},${b})`;
      }

      function drawCar(c) {
        const s = toScreen(c.x, c.y, 8);
        if (s.x < -120 || s.y < -140 || s.x > innerWidth + 120 || s.y > innerHeight + 120) return;
        ctx.save();
        ctx.translate(s.x, s.y);
        ctx.scale(1, VIEW_TILT);
        ctx.rotate(c.angle - cameraAngle);
        ctx.fillStyle = "rgba(0,0,0,0.36)";
        ctx.fillRect(-35, -19, 76, 40);
        ctx.fillStyle = c.police ? "#f0f4f8" : c.color;
        roundRect(-34, -17, 68, 34, 5);
        ctx.fillStyle = c.police ? "#1b2633" : "rgba(10,18,22,0.78)";
        roundRect(-6, -13, 24, 26, 4);
        ctx.fillStyle = "#111";
        ctx.fillRect(-25, -22, 14, 5);
        ctx.fillRect(12, -22, 14, 5);
        ctx.fillRect(-25, 17, 14, 5);
        ctx.fillRect(12, 17, 14, 5);
        if (c.police && player.wanted > 0.5) {
          ctx.fillStyle = Math.sin(performance.now() / 90) > 0 ? "#2f78ff" : "#ff3030";
          ctx.fillRect(-4, -18, 18, 5);
        }
        ctx.restore();
      }

      function roundRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.roundRect(x, y, w, h, r);
        ctx.fill();
      }

      function drawPerson(p, hero = false) {
        const s = toScreen(p.x, p.y, hero ? 14 : 8);
        if (s.x < -80 || s.y < -120 || s.x > innerWidth + 80 || s.y > innerHeight + 80) return;
        ctx.save();
        ctx.translate(s.x, s.y);
        ctx.scale(1, VIEW_TILT);
        ctx.rotate(p.angle - cameraAngle);
        ctx.fillStyle = "rgba(0,0,0,0.28)";
        ctx.beginPath();
        ctx.ellipse(4, 8, 14, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = hero ? "#f1e7d0" : p.color;
        ctx.beginPath();
        ctx.arc(0, 0, hero ? 14 : 10, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = hero ? "#354b66" : "#202020";
        ctx.fillRect(7, -4, 20, 8);
        if (hero && player.meleeCd > 0.18) {
          ctx.strokeStyle = "#f0d176";
          ctx.lineWidth = 5;
          ctx.beginPath();
          ctx.arc(20, 0, 22, -0.55, 0.55);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawProp(p) {
        const s = toScreen(p.x, p.y);
        if (s.x < -80 || s.y < -110 || s.x > innerWidth + 80 || s.y > innerHeight + 80) return;
        if (p.type === "lamp") {
          const top = toScreen(p.x, p.y, 54);
          ctx.strokeStyle = "#2e3334";
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.moveTo(s.x, s.y);
          ctx.lineTo(top.x, top.y);
          ctx.stroke();
          ctx.fillStyle = "rgba(255,218,133,0.5)";
          ctx.beginPath();
          ctx.arc(top.x, top.y, 9, 0, Math.PI * 2);
          ctx.fill();
        } else {
          const top = toScreen(p.x, p.y, 34);
          ctx.fillStyle = "#3f6e4b";
          ctx.beginPath();
          ctx.arc(top.x, top.y, 18, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#4a3324";
          ctx.fillRect(s.x - 3, s.y - 25, 6, 25);
        }
      }

      function render() {
        const sky = ctx.createLinearGradient(0, 0, 0, innerHeight);
        sky.addColorStop(0, "#101a22");
        sky.addColorStop(0.48, "#172227");
        sky.addColorStop(1, "#24312b");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, innerWidth, innerHeight);

        const ground = toScreen(WORLD / 2, WORLD / 2);
        ctx.fillStyle = "#263b2c";
        ctx.fillRect(0, ground.y - 2600, innerWidth, 5200);
        drawRoadGrid();

        const visibleBuildings = buildings
          .filter(b => {
            const s = toScreen(b.x + b.w / 2, b.y + b.h / 2);
            return s.x > -500 && s.x < innerWidth + 500 && s.y > -500 && s.y < innerHeight + 500;
          })
          .sort((a, b) => toScreen(a.x, a.y).depth - toScreen(b.x, b.y).depth);

        for (const p of props) drawProp(p);
        for (const b of visibleBuildings) drawBuilding(b);
        for (const c of cars) drawCar(c);
        for (const p of people) if (!p.dead) drawPerson(p);
        if (!player.car) drawPerson(player, true);

        ctx.strokeStyle = "#ffe08a";
        ctx.lineWidth = 3;
        for (const b of bullets) {
          const s1 = toScreen(b.x, b.y, 12);
          const s2 = toScreen(b.x - b.vx * 0.025, b.y - b.vy * 0.025, 12);
          ctx.beginPath();
          ctx.moveTo(s1.x, s1.y);
          ctx.lineTo(s2.x, s2.y);
          ctx.stroke();
        }

        for (const p of particles) {
          const s = toScreen(p.x, p.y, 16);
          ctx.globalAlpha = clamp(p.life * 2.2, 0, 1);
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(s.x, s.y, p.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }

        if (!player.car) {
          ctx.strokeStyle = "rgba(255,245,220,0.76)";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(aim.x, aim.y, 14, 0, Math.PI * 2);
          ctx.moveTo(aim.x - 23, aim.y);
          ctx.lineTo(aim.x - 7, aim.y);
          ctx.moveTo(aim.x + 7, aim.y);
          ctx.lineTo(aim.x + 23, aim.y);
          ctx.moveTo(aim.x, aim.y - 23);
          ctx.lineTo(aim.x, aim.y - 7);
          ctx.moveTo(aim.x, aim.y + 7);
          ctx.lineTo(aim.x, aim.y + 23);
          ctx.stroke();
        }

        drawMini();
        drawHud();
      }

      function drawMini() {
        const w = mini.clientWidth;
        const h = mini.clientHeight;
        miniCtx.clearRect(0, 0, w, h);
        miniCtx.save();
        miniCtx.beginPath();
        miniCtx.arc(w / 2, h / 2, w / 2 - 2, 0, Math.PI * 2);
        miniCtx.clip();
        miniCtx.fillStyle = "#18231f";
        miniCtx.fillRect(0, 0, w, h);
        miniCtx.strokeStyle = "#56625b";
        miniCtx.lineWidth = 2;
        for (let x = 0; x <= WORLD; x += ROAD_EVERY) {
          const sx = (x / WORLD) * w;
          miniCtx.beginPath();
          miniCtx.moveTo(sx, 0);
          miniCtx.lineTo(sx, h);
          miniCtx.stroke();
        }
        for (let y = 0; y <= WORLD; y += ROAD_EVERY) {
          const sy = (y / WORLD) * h;
          miniCtx.beginPath();
          miniCtx.moveTo(0, sy);
          miniCtx.lineTo(w, sy);
          miniCtx.stroke();
        }
        for (const c of cars) {
          if (c.police && player.wanted > 0.6) {
            miniCtx.fillStyle = "#4b8dff";
            miniCtx.fillRect((c.x / WORLD) * w - 2, (c.y / WORLD) * h - 2, 4, 4);
          }
        }
        miniCtx.fillStyle = "#fff0b8";
        miniCtx.beginPath();
        miniCtx.arc((player.x / WORLD) * w, (player.y / WORLD) * h, 4, 0, Math.PI * 2);
        miniCtx.fill();
        miniCtx.restore();
      }

      function drawHud() {
        healthBar.style.width = `${player.health}%`;
        armorBar.style.width = `${player.armor}%`;
        ammoText.textContent = player.reloadCd > 0 ? "..." : player.ammo;
        modeText.textContent = player.car ? `Driving ${Math.round(Math.abs(player.car.speed))}` : "Street";
        const full = Math.ceil(player.wanted);
        starsEl.innerHTML = "";
        for (let i = 1; i <= 5; i++) {
          const el = document.createElement(i <= full ? "b" : "span");
          el.textContent = "★";
          starsEl.appendChild(el);
        }
      }

      function step(now) {
        const dt = Math.min(0.033, (now - last) / 1000);
        last = now;
        updatePlayer(dt);
        updatePeople(dt);
        updateTraffic(dt);
        updateBullets(dt);
        updateParticles(dt);
        render();
        requestAnimationFrame(step);
      }

      addEventListener("resize", resize);
      addEventListener("keydown", e => {
        const k = e.key.toLowerCase();
        keys.add(k);
        if (k === "e") enterExitCar();
        if (k === "f") melee();
        if (k === "r") reload();
      });
      addEventListener("keyup", e => keys.delete(e.key.toLowerCase()));
      addEventListener("mousemove", e => {
        aim.x = e.clientX;
        aim.y = e.clientY;
      });
      addEventListener("mousedown", () => { input.fire = true; });
      addEventListener("mouseup", () => { input.fire = false; });

      function holdButton(id, down, up) {
        const btn = document.getElementById(id);
        btn.addEventListener("pointerdown", e => {
          e.preventDefault();
          btn.setPointerCapture(e.pointerId);
          down();
        });
        btn.addEventListener("pointerup", up);
        btn.addEventListener("pointercancel", up);
      }

      holdButton("fireBtn", () => { input.fire = true; }, () => { input.fire = false; });
      holdButton("boostBtn", () => { input.boost = true; }, () => { input.boost = false; });
      document.getElementById("hitBtn").addEventListener("pointerdown", e => {
        e.preventDefault();
        melee();
      });
      document.getElementById("carBtn").addEventListener("pointerdown", e => {
        e.preventDefault();
        enterExitCar();
      });

      stick.addEventListener("pointerdown", moveStick);
      stick.addEventListener("pointermove", moveStick);
      stick.addEventListener("pointerup", resetStick);
      stick.addEventListener("pointercancel", resetStick);

      function moveStick(e) {
        e.preventDefault();
        stick.setPointerCapture(e.pointerId);
        const rect = stick.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const dx = e.clientX - cx;
        const dy = e.clientY - cy;
        const mag = len(dx, dy) || 1;
        const max = rect.width * 0.34;
        const m = Math.min(max, mag);
        input.x = (dx / mag) * (m / max);
        input.y = (dy / mag) * (m / max);
        knob.style.transform = `translate(${(dx / mag) * m}px, ${(dy / mag) * m}px)`;
        aim.x = innerWidth / 2 + input.x * 160;
        aim.y = innerHeight / 2 + input.y * 160;
      }

      function resetStick() {
        input.x = 0;
        input.y = 0;
        knob.style.transform = "translate(0, 0)";
      }

      resize();
      spawnWorld();
      cameraAngle = player.angle;
      requestAnimationFrame(step);
    })();
  </script>
</body>
</html>
