<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Open City 3D</title>
  <link rel="stylesheet" href="./src/styles.css">
</head>
<body>
  <div id="game"></div>

  <div class="hud" aria-hidden="true">
    <section class="panel">
      <p class="brand">Open City 3D</p>
      <div class="row"><span>Health</span><div class="bar"><span id="health"></span></div></div>
      <div class="row"><span>Armor</span><div class="bar"><span id="armor"></span></div></div>
      <div class="row"><span>Ammo</span><strong id="ammo">48</strong></div>
      <div class="row"><span>Mode</span><strong id="mode">On foot</strong></div>
    </section>

    <section class="panel compact">
      <div id="stars" class="stars"></div>
    </section>
  </div>

  <div id="mission" class="mission">Explore the city. Find a car, drive, shoot, and survive the wanted level.</div>
  <div class="crosshair" aria-hidden="true"></div>
  <div id="weapon" class="weapon" aria-hidden="true"><div class="gun"></div></div>
  <div class="help">Click: mouse look | WASD: move/drive | Left click: shoot | F: melee | E: enter/exit | Shift: sprint | Space: brake/boost | R: reload</div>

  <div class="touch" aria-hidden="true">
    <div id="stick" class="stick"><div id="moveKnob" class="knob"></div></div>
    <div class="actions">
      <button id="hitBtn" type="button">HIT</button>
      <button id="fireBtn" type="button">FIRE</button>
      <button id="carBtn" type="button">CAR</button>
      <button id="gasBtn" type="button">GAS</button>
    </div>
    <div id="look" class="look"><div id="lookKnob" class="knob"></div></div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
